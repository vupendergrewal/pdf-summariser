<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary Result</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 min-h-screen p-10">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-4xl font-bold text-white mb-2 text-center">📄 PDF Summariser</h1>
        <p class="text-gray-400 text-center mb-8">Your AI-powered summary is ready</p>
        {% if error %}
        <div class="bg-red-800 text-white p-4 rounded-xl mb-6">❌ {{ error }}</div>
        {% else %}
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-gray-800 p-4 rounded-xl text-center">
                <p class="text-blue-400 text-2xl font-bold">{{ word_count }}</p>
                <p class="text-gray-400 text-sm">Total Words</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl text-center">
                <p class="text-green-400 text-2xl font-bold">{{ sentence_count }}</p>
                <p class="text-gray-400 text-sm">Summary Sentences</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl text-center">
                <p class="text-purple-400 text-2xl font-bold">📁</p>
                <p class="text-gray-400 text-sm">{{ filename }}</p>
            </div>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl mb-6">
            <h2 class="text-white text-xl font-bold mb-4">📝 Summary</h2>
            <p class="text-gray-300 leading-relaxed">{{ summary }}</p>
        </div>
        {% endif %}
        <a href="/" class="block text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200">
            ⬅ Summarise Another PDF
        </a>
    </div>
</body>
</html>
